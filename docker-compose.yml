services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: incidentdesk
      POSTGRES_PASSWORD: incidentdesk
      POSTGRES_DB: incidentdesk
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U incidentdesk']
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: ./server
    environment:
      DATABASE_URL: postgresql://incidentdesk:incidentdesk@db:5432/incidentdesk?sslmode=disable
      JWT_SECRET: docker-dev-secret-change-me
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:8080
      PORT: 4000
      # Local compose runs over http on same origin via the nginx proxy,
      # so cookies use lax/non-secure. Production deploy uses https + secure.
      NODE_ENV: development
    # No host port — the client (nginx) reaches the API over the internal
    # Docker network at http://server:4000, so nothing collides with local dev.
    depends_on:
      db:
        condition: service_healthy

  client:
    build: ./client
    ports:
      - '8080:80'
    depends_on:
      - server

volumes:
  pgdata:
